<!-- Minimal payment form UI. Collects email, amount, card number, and optional coupon,
     then POSTs to /pay and displays the result (success or error). -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment</title>
  <style>
    body { font-family: sans-serif; max-width: 420px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.4rem; }
    label { display: block; margin-top: 12px; font-size: 0.9rem; }
    input { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 10px 20px; cursor: pointer; }
    #result { margin-top: 20px; white-space: pre-wrap; font-size: 0.85rem; }
    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>
  <h1>Payment Form</h1>
  <form id="payForm">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required>

    <label for="total">Amount</label>
    <input id="total" name="total" type="number" step="0.01" min="0.01" required>

    <label for="cardNumber">Card Number</label>
    <input id="cardNumber" name="cardNumber" maxlength="16" required>

    <label for="coupon">Coupon Code (optional)</label>
    <input id="coupon" name="coupon">

    <button type="submit" id="submitBtn">Pay</button>
  </form>
  <div id="result"></div>

  <script>
    document.getElementById("payForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const resultDiv = document.getElementById("result");
      resultDiv.textContent = "";
      resultDiv.className = "";

      const body = {
        email: document.getElementById("email").value,
        total: parseFloat(document.getElementById("total").value),
        cardNumber: document.getElementById("cardNumber").value,
        coupon: document.getElementById("coupon").value || undefined,
      };

      try {
        const res = await fetch("/pay", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) {
          resultDiv.className = "error";
          resultDiv.textContent = "Error: " + (data.error || res.statusText);
        } else {
          resultDiv.className = "success";
          resultDiv.textContent = "Payment successful!\n" + JSON.stringify(data, null, 2);
        }
      } catch (err) {
        resultDiv.className = "error";
        resultDiv.textContent = "Network error: " + err.message;
      }
    });
  </script>
</body>
</html>
